async function evaluarConIA({semanaConfig,tipoEntrega,contenido}){
  const criteriosTexto=semanaConfig.criterios.map((c,i)=>`C${i+1} [Peso ${c.peso}%]: ${c.texto}`).join("\n");
  const prompt=`Eres un docente evaluador experto en Machine Learning con criterio académico estricto. Evalúa la siguiente evidencia.

SEMANA ${semanaConfig.semana}: ${semanaConfig.titulo}
TAREA REQUERIDA: ${semanaConfig.descripcion}

CRITERIOS DE EVALUACIÓN:
${criteriosTexto}

EVIDENCIA ENTREGADA (${tipoEntrega}):
${contenido}

INSTRUCCIONES DE EVALUACIÓN — LEE CON ATENCIÓN:

PASO 1 — Analiza la evidencia contra cada criterio individualmente.
Para cada criterio Cn, determina qué porcentaje (0–100) del criterio está EFECTIVAMENTE CUBIERTO en la evidencia.
Un criterio está cubierto al 100% solo si la evidencia lo aborda de forma completa, con argumentación, ejemplos o desarrollo concreto.
Un criterio está cubierto parcialmente si solo se menciona superficialmente.
Un criterio NO está cubierto si la evidencia no lo toca o lo ignora.

PASO 2 — Calcula la cobertura ponderada total:
puntaje_interno = suma de (cobertura_Cn × peso_Cn / 100) para todos los criterios.

PASO 3 — Aplica esta REGLA ESTRICTA para Aprobado:
- "Aprobado" SOLO se otorga si puntaje_interno ≥ 85 Y ADEMÁS cada criterio individual tiene cobertura ≥ 70%.
  Si algún criterio tiene cobertura < 70%, el nivel máximo posible es "Consolidado", sin importar el puntaje total.
- "Consolidado": puntaje_interno ≥ 65 (y no cumple regla de Aprobado)
- "En Proceso": puntaje_interno ≥ 40
- "Iniciado": puntaje_interno < 40

PASO 4 — Escribe la retroalimentación en ESPAÑOL, en tono docente, SIN mencionar números ni porcentajes.
- aspectos_cumplidos: qué criterios están bien desarrollados y por qué.
- aspectos_por_mejorar: qué criterios están incompletos o ausentes, con indicaciones concretas.
- recomendacion: un único paso accionable y específico para mejorar.

Si la evidencia es una URL: usa la herramienta web_search para acceder y analizar el contenido real de esa URL antes de evaluar.

Responde ÚNICAMENTE con este JSON (sin markdown, sin texto adicional):
{"puntaje_interno":0,"aspectos_cumplidos":"","aspectos_por_mejorar":"","recomendacion":""}`;
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,
      tools:[{type:"web_search_20250305",name:"web_search"}],
      messages:[{role:"user",content:prompt}]})});
  const data=await res.json();
  const texto=data.content.filter(b=>b.type==="text").map(b=>b.text).join("");
  return JSON.parse(texto.replace(/```json|```/g,"").trim());
}

function cargarScript(src){
  return new Promise((res,rej)=>{
    if(document.querySelector(`script[src="${src}"]`)){res();return;}
    const s=document.createElement("script");
    s.src=src; s.onload=res; s.onerror=rej;
    document.head.appendChild(s);
  });
}

function AgenteEvidencias(){
  const [semanaIdx,setSemanaIdx]         =useState(0);
  const [tipoEntrega,setTipoEntrega]     =useState("url");
  const [urlVal,setUrlVal]               =useState("");
  const [textoVal,setTextoVal]           =useState("");
  const [archivoNombre,setArchivoNombre] =useState("");
  const [archivoTexto,setArchivoTexto]   =useState("");
  const [resultado,setResultado]         =useState(null);
  const [cargando,setCargando]           =useState(false);
  const [error,setError]                 =useState("");
  const [vista,setVista]                 =useState("entregar");
  const [nombreParticipante,setNombreParticipante]=useState("");
  const [vistaDoc,setVistaDoc]           =useState(false);
  const [fechaDoc,setFechaDoc]           =useState("");
  const fileRef=useRef();
  const semana=CURSO_CONFIG.semanas[semanaIdx];

  const handleArchivo=async(e)=>{
    const file=e.target.files[0]; if(!file) return;
    setArchivoNombre(file.name);
    setArchivoTexto(""); setError("");

    if(file.type==="text/plain"){
      const reader=new FileReader();
      reader.onload=ev=>setArchivoTexto((ev.target.result||"").slice(0,12000));
      reader.readAsText(file); return;
    }

    if(file.type==="application/pdf"||file.name.toLowerCase().endsWith(".pdf")){
      try{
        await cargarScript("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js");
        window.pdfjsLib.GlobalWorkerOptions.workerSrc=
          "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
        const buf=await file.arrayBuffer();
        const pdfDoc=await window.pdfjsLib.getDocument({data:buf}).promise;
        const partes=[];
        const maxP=Math.min(pdfDoc.numPages,15);
        for(let p=1;p<=maxP;p++){
          const pag=await pdfDoc.getPage(p);
          const ct=await pag.getTextContent();
          partes.push(ct.items.map(function(i){return i.str;}).join(" "));
        }
        const limpio=partes.join(" ").replace(/\s+/g," ").trim().slice(0,12000);
        setArchivoTexto(limpio.length>40 ? limpio : "[PDF sin texto extraible. Usa URL o pega el texto directamente.]");
      }catch(err){
        setArchivoTexto("[Error leyendo PDF. Usa URL o Texto directo.]");
      }
      return;
    }

    setArchivoTexto(`[${file.name} — formato no legible. Copia el texto en "Texto directo" o usa la URL de tu publicación.]`);
  };

  const handleEvaluar=async()=>{
    setError("");
    let contenido="";
    if(tipoEntrega==="url"){
      if(!urlVal.trim()){setError("Ingresa una URL válida.");return;}
      contenido=`URL: ${urlVal}`;
    } else if(tipoEntrega==="texto"){
      if(textoVal.trim().length<80){setError("Mínimo 80 caracteres.");return;}
      contenido=textoVal;
    } else {
      if(!archivoTexto){setError("Sube un archivo primero.");return;}
      contenido=archivoTexto;
    }
    setCargando(true);
    try{
      const ia=await evaluarConIA({semanaConfig:semana,tipoEntrega,contenido});
      const nivel=determinarNivel(ia.puntaje_interno);
      setResultado({semana:semana.semana,titulo:semana.titulo,nivel,
        aspectos_cumplidos:ia.aspectos_cumplidos,
        aspectos_por_mejorar:ia.aspectos_por_mejorar,
        recomendacion:ia.recomendacion});
      setVista("resultado");
    } catch{ setError("Error al evaluar. Verifica tu conexión e intenta de nuevo."); }
    setCargando(false);
  };

  const resetForm=()=>{
    setResultado(null);setUrlVal("");setTextoVal("");
    setArchivoNombre("");setArchivoTexto("");setError("");
    setVista("entregar");setVistaDoc(false);
  };

  const abrirDoc=()=>{
    const fh=new Date().toLocaleString("es-CO",{
      weekday:"long",year:"numeric",month:"long",
      day:"numeric",hour:"2-digit",minute:"2-digit"});
    setFechaDoc(fh);
    setVistaDoc(true);
  };

  if(vistaDoc&&resultado){
    return(
      <DocumentoImprimible
        resultado={resultado}
        nombre={nombreParticipante.trim()||"Participante"}
        fechaHora={fechaDoc}
        onVolver={()=>setVistaDoc(false)}
      />
    );
  }

  const card={background:C.blanco,borderRadius:12,padding:"20px 22px",
    marginBottom:14,boxShadow:"0 2px 8px rgba(13,27,42,.09)"};
  const cardCrema={...card,background:C.crema,border:`1px solid ${C.cremaMedio}`,
    boxShadow:"none"};
  const lbl={display:"block",fontWeight:700,fontSize:10,color:C.grisClaro,
    marginBottom:8,textTransform:"uppercase",letterSpacing:1.5};
  const btn={border:"none",borderRadius:8,cursor:"pointer",fontWeight:700,
    transition:"all .18s",fontFamily:"inherit"};

  return(
    <div style={{fontFamily:"'Segoe UI',system-ui,sans-serif",minHeight:"100vh",
      background:"#C8B99A"}}>

      {/* CABECERA */}
      <div style={{background:"#C8B99A",color:C.azulNoche}}>
        <div style={{height:4,background:`linear-gradient(90deg,${C.dorado},${C.naranja},${C.dorado})`}}/>
        <div style={{maxWidth:820,margin:"0 auto",padding:"20px 20px 0"}}>
          <div style={{display:"flex",alignItems:"flex-start",marginBottom:20}}>
            <div style={{background:C.azulNoche,color:C.dorado,padding:"8px 14px",
              borderRadius:"8px 0 0 8px",fontWeight:900,fontSize:18,letterSpacing:1,
              display:"flex",alignItems:"center",whiteSpace:"nowrap",flexShrink:0}}>
              {CURSO_CONFIG.codigo}
            </div>
            <div style={{background:"rgba(13,27,42,.10)",padding:"8px 16px",
              borderRadius:"0 8px 8px 0",flex:1,
              border:"1px solid rgba(13,27,42,.18)",borderLeft:"none"}}>
              <div style={{fontWeight:900,fontSize:16,color:C.azulNoche}}>Diplomado IAG</div>
              <div style={{fontSize:11,color:C.azulSuave,marginTop:2,fontWeight:600}}>
                {CURSO_CONFIG.nombreLargo}
              </div>
            </div>
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",paddingBottom:14}}>
            <span style={{fontSize:10,color:C.azulSuave,alignSelf:"center",marginRight:4,
              textTransform:"uppercase",letterSpacing:1,fontWeight:700}}>Escala:</span>
            {RUBRICA.map(r=>(
              <div key={r.nivel} style={{display:"flex",alignItems:"center",gap:5,
                background:"rgba(13,27,42,.08)",border:"1px solid rgba(13,27,42,.20)",
                borderRadius:20,padding:"3px 10px",fontSize:11,
                color:C.azulNoche,fontWeight:600}}>
                <span style={{fontSize:10}}>{r.emoji}</span><span>{r.nivel}</span>
              </div>
            ))}
          </div>
          <div style={{height:1,background:`linear-gradient(90deg,${C.dorado}88,transparent)`}}/>
          <div style={{display:"flex",gap:0}}>
            {[{id:"entregar",label:"Entregar Evidencia"},
              {id:"resultado",label:"Retroalimentación"}].map(t=>(
              <button key={t.id} onClick={()=>setVista(t.id)} style={{
                ...btn,padding:"11px 22px",fontSize:13,borderRadius:"8px 8px 0 0",
                background:vista===t.id?C.crema:"transparent",
                color:vista===t.id?C.azulNoche:`${C.azulNoche}88`,
                borderBottom:vista===t.id?`3px solid ${C.dorado}`:"3px solid transparent",
                marginRight:4}}>
                {t.label}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* CONTENIDO */}
      <div style={{maxWidth:820,margin:"0 auto",padding:"22px 16px 52px"}}>

        {/* VISTA ENTREGAR */}
        {vista==="entregar"&&(<>
          <div style={card}>
            <label style={lbl}>Selecciona la semana</label>
            <div style={{display:"flex",gap:8}}>
              {CURSO_CONFIG.semanas.map((s,i)=>{
                const activo=semanaIdx===i;
                return(
                  <button key={i} onClick={()=>{setSemanaIdx(i);setResultado(null);setError("");}}
                    style={{...btn,flex:1,padding:"13px 8px",fontSize:13,
                      background:activo?C.azulNoche:C.crema,
                      color:activo?C.blanco:C.grisTexto,
                      border:activo?`2px solid ${C.dorado}`:`2px solid ${C.cremaMedio}`}}>
                    <div style={{width:28,height:28,borderRadius:"50%",margin:"0 auto 6px",
                      background:activo?C.dorado:C.cremaMedio,
                      color:activo?C.azulNoche:C.grisClaro,
                      display:"flex",alignItems:"center",justifyContent:"center",
                      fontWeight:900,fontSize:13}}>{s.semana}</div>
                    <div style={{fontWeight:700,fontSize:12,lineHeight:1.3}}>
                      {s.titulo.split(" ").slice(0,2).join(" ")}<br/>
                      {s.titulo.split(" ").slice(2).join(" ")}
                    </div>
                  </button>
                );
              })}
            </div>
          </div>

          <div style={{...cardCrema,borderLeft:`4px solid ${C.dorado}`}}>
            <div style={{display:"flex",gap:14,alignItems:"flex-start"}}>
              <div style={{width:38,height:38,borderRadius:10,flexShrink:0,
                background:C.azulNoche,color:C.dorado,display:"flex",
                alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:16}}>
                S{semana.semana}
              </div>
              <div style={{flex:1}}>
                <h2 style={{margin:"0 0 6px",fontSize:16,color:C.azulNoche,
                  fontWeight:800}}>{semana.titulo}</h2>
                <p style={{margin:"0 0 14px",fontSize:13,color:C.grisTexto,lineHeight:1.7}}>
                  {semana.descripcion}
                </p>
                <div style={{height:1,background:C.cremaMedio,margin:"10px 0"}}/>
                <div style={{fontSize:10,fontWeight:700,color:C.grisClaro,
                  textTransform:"uppercase",letterSpacing:1.2,marginBottom:10}}>
                  Lo que se evaluará
                </div>
                {semana.criterios.map((c,i)=>(
                  <div key={c.id} style={{display:"flex",gap:10,alignItems:"flex-start",
                    marginBottom:9,fontSize:13,color:C.grisTexto,lineHeight:1.6}}>
                    <span style={{width:22,height:22,borderRadius:"50%",flexShrink:0,
                      background:C.azulNoche,color:C.dorado,display:"flex",
                      alignItems:"center",justifyContent:"center",
                      fontSize:11,fontWeight:800,marginTop:1}}>{i+1}</span>
                    <span>{c.texto}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>

          <div style={card}>
            <label style={lbl}>Tipo de entrega</label>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",
              gap:8,marginBottom:20}}>
              {[{id:"url",icon:"🔗",label:"URL / Blog",sub:"Enlace a tu publicación"},
                {id:"archivo",icon:"📄",label:"PDF / Word",sub:"Sube tu documento"},
                {id:"texto",icon:"✏️",label:"Texto directo",sub:"Escribe o pega aquí"}
              ].map(t=>{
                const activo=tipoEntrega===t.id;
                return(
                  <button key={t.id} onClick={()=>setTipoEntrega(t.id)} style={{
                    ...btn,padding:"12px 8px",textAlign:"center",
                    background:activo?C.azulNoche:C.crema,
                    border:activo?`2px solid ${C.dorado}`:`2px solid ${C.cremaMedio}`,
                    color:activo?C.blanco:C.grisTexto}}>
                    <div style={{fontSize:22,marginBottom:4}}>{t.icon}</div>
                    <div style={{fontSize:13,fontWeight:700}}>{t.label}</div>
                    <div style={{fontSize:11,opacity:.7,marginTop:2}}>{t.sub}</div>
                  </button>
                );
              })}
            </div>
            {tipoEntrega==="url"&&(
              <input value={urlVal} onChange={e=>setUrlVal(e.target.value)}
                placeholder="https://mi-blog.com/evidencia-semana-1"
                style={{width:"100%",padding:"11px 14px",boxSizing:"border-box",
                  border:`2px solid ${C.cremaMedio}`,borderRadius:8,fontSize:14,
                  outline:"none",fontFamily:"inherit",background:C.crema,color:C.negro}}
                onFocus={e=>e.target.style.borderColor=C.dorado}
                onBlur={e=>e.target.style.borderColor=C.cremaMedio}/>
            )}
            {tipoEntrega==="texto"&&(
              <textarea value={textoVal} onChange={e=>setTextoVal(e.target.value)}
                placeholder="Pega o escribe aquí el texto de tu evidencia (mínimo 80 caracteres)..."
                rows={7}
                style={{width:"100%",padding:"11px 14px",boxSizing:"border-box",
                  border:`2px solid ${C.cremaMedio}`,borderRadius:8,fontSize:13,
                  outline:"none",fontFamily:"inherit",background:C.crema,
                  color:C.negro,resize:"vertical"}}
                onFocus={e=>e.target.style.borderColor=C.dorado}
                onBlur={e=>e.target.style.borderColor=C.cremaMedio}/>
            )}
            {tipoEntrega==="archivo"&&(
              <div>
                <input type="file" ref={fileRef} onChange={handleArchivo}
                  accept=".pdf,.txt" style={{display:"none"}}/>
                <button onClick={()=>fileRef.current.click()} style={{
                  ...btn,padding:"11px 20px",background:C.azulNoche,color:C.dorado,
                  border:`2px solid ${C.dorado}`,fontSize:13,
                  marginBottom:archivoNombre?10:0}}>
                  📎 Seleccionar PDF o TXT
                </button>
                {archivoNombre&&(
                  <div style={{fontSize:12,marginTop:8}}>
                    {archivoTexto&&!archivoTexto.startsWith("[")
                      ? <span style={{color:"#2e7d32",fontWeight:700}}>✅ {archivoNombre} — texto extraído ({archivoTexto.length} caracteres)</span>
                      : archivoTexto.startsWith("[")
                        ? <span style={{color:C.naranja,fontWeight:600}}>⚠ {archivoTexto}</span>
                        : <span style={{color:C.grisTexto}}>⏳ Leyendo {archivoNombre}…</span>
                    }
                  </div>
                )}
              </div>
            )}
          </div>

          {error&&(
            <div style={{background:"#FDE8D8",border:"2px solid #E07B39",borderRadius:8,
              padding:"12px 16px",marginBottom:14,fontSize:13,color:"#7A2E00"}}>
              ⚠ {error}
            </div>
          )}

          <button onClick={handleEvaluar} disabled={cargando} style={{
            ...btn,width:"100%",padding:"15px",fontSize:15,
            background:cargando?C.azulMedio:`linear-gradient(135deg,${C.azulNoche},${C.azulMedio})`,
            color:cargando?C.grisClaro:C.dorado,
            border:`2px solid ${cargando?C.azulMedio:C.dorado}`,
            boxShadow:cargando?"none":"0 4px 18px rgba(13,27,42,.25)",
            cursor:cargando?"not-allowed":"pointer",letterSpacing:.5}}>
            {cargando?"⏳ Analizando tu evidencia…":"Enviar y Recibir Retroalimentación"}
          </button>
        </>)}

        {/* RESULTADO VACÍO */}
        {vista==="resultado"&&!resultado&&(
          <div style={{...card,textAlign:"center",padding:"60px 20px"}}>
            <div style={{width:64,height:64,borderRadius:"50%",margin:"0 auto 16px",
              background:C.doradoPale,border:`2px solid ${C.doradoClaro}`,
              display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:28,color:C.dorado}}>◎</div>
            <p style={{margin:"0 0 6px",fontSize:16,fontWeight:700,color:C.azulNoche}}>
              Sin retroalimentación aún
            </p>
            <p style={{margin:"0 0 20px",fontSize:13,color:C.grisClaro}}>
              Entrega una evidencia para recibir tu evaluación.
            </p>
            <button onClick={()=>setVista("entregar")} style={{
              ...btn,padding:"10px 28px",background:C.azulNoche,color:C.dorado,
              border:`2px solid ${C.dorado}`,fontSize:13}}>Ir a Entregar</button>
          </div>
        )}

        {/* RESULTADO CON DATOS */}
        {vista==="resultado"&&resultado&&(()=>{
          const {nivel}=resultado;
          const esAprobado=nivel.nivel==="Aprobado";
          return(
            <div>
              {/* Badge nivel */}
              <div style={{background:nivel.bgCard,border:`2px solid ${nivel.borderCard}`,
                borderRadius:14,padding:"30px 24px",marginBottom:14,
                textAlign:"center",boxShadow:"0 4px 20px rgba(13,27,42,.10)"}}>
                <div style={{width:70,height:70,borderRadius:"50%",background:nivel.badge,
                  color:nivel.badgeText,margin:"0 auto 14px",display:"flex",
                  alignItems:"center",justifyContent:"center",fontSize:34,fontWeight:900,
                  boxShadow:`0 4px 14px ${nivel.badge}55`}}>{nivel.emoji}</div>
                <div style={{display:"inline-block",background:nivel.badge,
                  color:nivel.badgeText,borderRadius:24,padding:"7px 26px",
                  fontSize:18,fontWeight:900,letterSpacing:1,marginBottom:14,
                  textTransform:"uppercase"}}>{nivel.nivel}</div>
                <p style={{margin:"0 0 6px",fontSize:15,color:C.negro,fontWeight:600,
                  lineHeight:1.5}}>{nivel.descripcion}</p>
                <div style={{fontSize:12,color:C.grisClaro,marginTop:8}}>
                  Semana {resultado.semana} · {resultado.titulo}
                </div>
              </div>

              {/* Escala */}
              <div style={{...card,padding:"16px 18px"}}>
                <label style={lbl}>Tu posición en la rúbrica</label>
                <div style={{display:"flex",gap:6}}>
                  {RUBRICA.slice().reverse().map(r=>{
                    const esActual=r.nivel===nivel.nivel;
                    return(
                      <div key={r.nivel} style={{flex:1,padding:"8px 4px",borderRadius:8,
                        textAlign:"center",fontSize:11,fontWeight:700,
                        background:esActual?r.badge:C.crema,
                        color:esActual?r.badgeText:C.grisClaro,
                        border:esActual?`2px solid ${r.badge}`:`2px solid ${C.cremaMedio}`}}>
                        <div style={{fontSize:15,marginBottom:2}}>{r.emoji}</div>
                        <div style={{fontSize:10}}>{r.nivel}</div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* Cumplidos */}
              <div style={{...card,borderLeft:`4px solid ${C.dorado}`}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <div style={{width:30,height:30,borderRadius:"50%",background:C.doradoPale,
                    border:`2px solid ${C.dorado}`,display:"flex",alignItems:"center",
                    justifyContent:"center",fontSize:14,color:C.dorado,
                    fontWeight:900,flexShrink:0}}>★</div>
                  <span style={{fontWeight:700,fontSize:14,color:C.azulNoche}}>
                    Aspectos que cumpliste
                  </span>
                </div>
                <p style={{margin:0,fontSize:14,color:C.grisTexto,lineHeight:1.78}}>
                  {resultado.aspectos_cumplidos}
                </p>
              </div>

              {/* Por mejorar */}
              <div style={{...card,borderLeft:`4px solid ${C.naranja}`}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <div style={{width:30,height:30,borderRadius:"50%",background:C.naranjaPale,
                    border:`2px solid ${C.naranja}`,display:"flex",alignItems:"center",
                    justifyContent:"center",fontSize:14,color:C.naranja,
                    fontWeight:900,flexShrink:0}}>◎</div>
                  <span style={{fontWeight:700,fontSize:14,color:C.azulNoche}}>
                    {esAprobado
                      ?"Para mantener este nivel en próximas semanas"
                      :"Aspectos a profundizar para avanzar"}
                  </span>
                </div>
                <p style={{margin:0,fontSize:14,color:C.grisTexto,lineHeight:1.78}}>
                  {resultado.aspectos_por_mejorar}
                </p>
              </div>

              {/* Expectativa */}
              <div style={{...cardCrema,borderLeft:`4px solid ${C.azulMedio}`}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <div style={{width:30,height:30,borderRadius:"50%",background:C.azulNoche,
                    display:"flex",alignItems:"center",justifyContent:"center",
                    fontSize:13,color:C.dorado,fontWeight:900,flexShrink:0}}>◆</div>
                  <span style={{fontWeight:700,fontSize:14,color:C.azulNoche}}>
                    ¿Qué se espera de ti en este nivel?
                  </span>
                </div>
                <p style={{margin:0,fontSize:14,color:C.grisTexto,lineHeight:1.78}}>
                  {nivel.expectativa}
                </p>
              </div>

              {/* Próximo paso */}
              <div style={{background:C.azulNoche,borderRadius:12,padding:"20px 22px",
                marginBottom:14,boxShadow:"0 4px 16px rgba(13,27,42,.2)"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <div style={{width:30,height:30,borderRadius:"50%",background:C.dorado,
                    display:"flex",alignItems:"center",justifyContent:"center",
                    fontSize:14,color:C.azulNoche,fontWeight:900,flexShrink:0}}>→</div>
                  <span style={{fontWeight:700,fontSize:14,color:C.dorado}}>
                    Próximo paso recomendado
                  </span>
                </div>
                <p style={{margin:0,fontSize:14,color:C.doradoClaro,lineHeight:1.78}}>
                  {resultado.recomendacion}
                </p>
              </div>

              <button onClick={resetForm} style={{...btn,width:"100%",padding:"13px",
                fontSize:14,background:C.crema,border:`2px solid ${C.azulNoche}`,
                color:C.azulNoche,marginBottom:14}}>
                ← Entregar otra evidencia
              </button>

              {/* BLOQUE CONDICIONAL */}
              {esAprobado ? (
                <div style={{background:C.doradoPale,border:`2px solid ${C.dorado}`,
                  borderRadius:12,padding:"20px 22px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
                    <div style={{width:36,height:36,borderRadius:"50%",background:C.dorado,
                      display:"flex",alignItems:"center",justifyContent:"center",
                      fontSize:18,color:C.azulNoche,fontWeight:900,flexShrink:0}}>★</div>
                    <div>
                      <div style={{fontSize:13,fontWeight:900,color:C.azulNoche,
                        textTransform:"uppercase",letterSpacing:1}}>
                        ¡Felicitaciones! Genera tu comprobante
                      </div>
                      <div style={{fontSize:11,color:C.grisTexto,marginTop:2}}>
                        Alcanzaste <strong>Aprobado</strong>. Ingresa tu nombre y genera el PDF oficial.
                      </div>
                    </div>
                  </div>

                  <label style={{...lbl,color:C.azulSuave}}>
                    Nombre completo del participante
                  </label>
                  <input value={nombreParticipante}
                    onChange={e=>setNombreParticipante(e.target.value)}
                    placeholder="Ej: María González Pérez"
                    style={{width:"100%",padding:"10px 14px",boxSizing:"border-box",
                      border:`2px solid ${C.doradoClaro}`,borderRadius:8,fontSize:14,
                      outline:"none",fontFamily:"inherit",background:C.blanco,
                      color:C.negro,marginBottom:14}}
                    onFocus={e=>e.target.style.borderColor=C.dorado}
                    onBlur={e=>e.target.style.borderColor=C.doradoClaro}/>

                  <button onClick={abrirDoc} style={{
                    ...btn,width:"100%",padding:"14px",fontSize:15,
                    background:`linear-gradient(135deg,${C.azulNoche},${C.azulMedio})`,
                    color:C.dorado,border:`2px solid ${C.dorado}`,
                    boxShadow:"0 4px 14px rgba(13,27,42,.3)",letterSpacing:.5}}>
                    📄 Ver Comprobante → Guardar imagen
                  </button>

                  <div style={{marginTop:12,padding:"11px 14px",
                    background:"rgba(13,27,42,.06)",borderRadius:8,
                    fontSize:12,color:C.grisTexto,lineHeight:2.1,textAlign:"center"}}>
                    Presiona <strong>🖼 Generar imagen</strong> → se abre la imagen del comprobante →
                    <strong> clic derecho → Guardar imagen</strong> (PC) o
                    <strong> mantén presionado → Descargar</strong> (móvil).
                  </div>
                </div>
              ) : (
                <div style={{background:nivel.bgCard,border:`2px solid ${nivel.borderCard}`,
                  borderRadius:12,padding:"20px 22px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
                    <div style={{width:42,height:42,borderRadius:"50%",background:nivel.badge,
                      color:nivel.badgeText,display:"flex",alignItems:"center",
                      justifyContent:"center",fontSize:20,fontWeight:900,flexShrink:0}}>
                      {nivel.emoji}
                    </div>
                    <div>
                      <div style={{fontSize:14,fontWeight:900,color:C.azulNoche}}>
                        Aún no puedes generar el comprobante
                      </div>
                      <div style={{fontSize:12,color:C.grisTexto,marginTop:2}}>
                        El comprobante se habilita{" "}
                        <strong>únicamente</strong> al alcanzar{" "}
                        <strong style={{color:"#C9A84C"}}>★ Aprobado</strong>.
                      </div>
                    </div>
                  </div>

                  <div style={{height:1,background:nivel.borderCard,
                    marginBottom:14,opacity:.4}}/>

                  <div style={{fontSize:13,fontWeight:800,color:C.azulNoche,
                    textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>
                    🔧 Realiza estos ajustes antes de volver a entregar:
                  </div>

                  <div style={{background:"rgba(255,255,255,.7)",
                    border:`1px solid ${nivel.borderCard}`,borderRadius:8,
                    padding:"12px 14px",marginBottom:12,
                    fontSize:13,color:C.grisTexto,lineHeight:1.75}}>
                    {resultado.aspectos_por_mejorar}
                  </div>

                  <div style={{background:C.azulNoche,borderRadius:8,
                    padding:"12px 14px",marginBottom:16}}>
                    <div style={{fontSize:11,fontWeight:700,color:C.dorado,
                      textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>
                      → Próximo paso recomendado
                    </div>
                    <div style={{fontSize:13,color:C.doradoClaro,lineHeight:1.75}}>
                      {resultado.recomendacion}
                    </div>
                  </div>

                  <button onClick={resetForm} style={{
                    ...btn,width:"100%",padding:"14px",fontSize:14,
                    background:`linear-gradient(135deg,${nivel.badge},${nivel.borderCard})`,
                    color:"#fff",border:"none",
                    boxShadow:`0 4px 14px ${nivel.badge}55`,letterSpacing:.3}}>
                    ✏️ Realizar ajustes y volver a solicitar retroalimentación
                  </button>
                </div>
              )}
            </div>
          );
        })()}
      </div>

      {/* PIE */}
      <div style={{background:C.azulNoche,borderTop:`3px solid ${C.dorado}`,
        padding:"18px 24px 14px",position:"relative"}}>
        <div style={{textAlign:"center",lineHeight:1.9}}>
          <div style={{fontSize:13,color:C.doradoClaro,fontWeight:700}}>
            Diplomado en Inteligencia Artificial Generativa
          </div>
          <div style={{fontSize:12,color:C.grisClaro}}>Modelo PACIE · Módulo 5 VIC</div>
          <div style={{fontSize:12,color:C.dorado,fontWeight:700,letterSpacing:1}}>
            PLANETA FATLA©
          </div>
        </div>
        <div style={{position:"absolute",bottom:12,right:20,textAlign:"right",lineHeight:1.4}}>
          <div style={{fontSize:12,color:C.dorado,fontWeight:800}}>tecnotips©</div>
          <div style={{fontSize:10,color:C.grisClaro}}>2026 Tecnología con propósito</div>
        </div>
      </div>
    </div>
  );
}

    // ── Montar la aplicación ──────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AgenteEvidencias />);
  </script>
</body>
</html>
